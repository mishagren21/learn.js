<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Item Details</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Golos+Text&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./item-detail.css" />
</head>

<body>
  <div class="card">
    <div class="card-image">
      <div class="badges">
        <span class="badge discount">-10%</span>
        <span class="badge blue">Броня</span>
        <span class="badge green">Пресс</span>
      </div>
      <img src="img/item-automatic.png" alt="Станок">
    </div>
    <h2 class="card-title">
      SG-006-1 Станок для разделки кабеля (Автоматический)
    </h2>
    <div class="card-info">
      <div><span>Вес</span><span>13 кг</span></div>
      <div><span>Двигатель</span><span>180 Вт</span></div>
      <div><span>Диам. обраб.</span><span>от 1,5 до 25 мм</span></div>
    </div>
    <div class="card-price">
      <span class="new-price">34 990 ₽</span>
      <span class="old-price">24 450 ₽</span>
    </div>


    <button class="buy-button">Купить</button>

  </div>

  <script>


  </script>
  <main id="product-item"></main>

  <script src="./js/item-detail.js" type="module"></script>
</body>

</html>
